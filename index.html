<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pif Paf Online</title>
<style>
body { font-family: Arial, sans-serif; }
.bloco { border: 1px solid #ccc; padding: 10px; margin: 5px; }
.botao { margin: 2px; }
</style>
</head>
<body>

<h2>Pif Paf Online</h2>

<div>
    <input type="text" id="novoNome" placeholder="Nome do jogador">
    <button onclick="adicionarJogador()">Adicionar jogador</button>
    <button onclick="resetar()">Resetar</button>
</div>

<div id="lista"></div>

<script>
async function carregar() {
    const res = await fetch("/");
    const html = await res.text();
    document.getElementById("lista").innerHTML = html;
}

async function atualizar() {
    const res = await fetch("/jogar", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({jogador:-1, valor:0}) });
    const dados = await res.json();
    mostrar(dados);
}

function mostrar(dados) {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";
    dados.nomes.forEach((nome,i)=>{
        let bloco = document.createElement("div");
        bloco.className = "bloco";
        bloco.innerHTML = `<b>${nome}</b>: ${dados.pontos[i]} pontos<br>`;
        for(let v=1;v<=5;v++){
            let b = document.createElement("button");
            b.className = "botao";
            b.innerText = v;
            b.onclick = ()=>jogar(i,v);
            bloco.appendChild(b);
        }
        let r = document.createElement("button");
        r.innerText = "Remover";
        r.onclick = ()=>remover(i);
        bloco.appendChild(r);
        lista.appendChild(bloco);
    });
}

async function jogar(jogador, valor){
    const res = await fetch("/jogar", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({jogador, valor})
    });
    const dados = await res.json();
    mostrar(dados);
}

async function adicionarJogador(){
    const nome = document.getElementById("novoNome").value;
    const res = await fetch("/add_jogador", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nome})
    });
    const dados = await res.json();
    mostrar(dados);
    document.getElementById("novoNome").value="";
}

async function remover(index){
    const confirmar = confirm("Tem certeza que deseja remover este jogador?");
    if(!confirmar) return; // Sai se clicar em Cancelar
    
    const res = await fetch("/remover_jogador", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({index})
    });
    const dados = await res.json();
    mostrar(dados);
}

async function resetar(){
    const res = await fetch("/reset",{method:"POST"});
    const dados = await res.json();
    mostrar(dados);
}

// Atualiza automaticamente a cada 2 segundos
setInterval(atualizar, 2000);

// Carrega ao abrir
carregar();
</script>
</body>
</html>
